<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>土鍋飯ぽかぽか</title>
<style>
/* ============================================================
   デザイントークン (design.md 正本)
============================================================ */
:root {
  --c-bg:           #12100e;
  --c-bg-card:      #1e1a16;
  --c-bg-overlay:   rgba(18,16,14,0.88);
  --c-bg-input:     #2a2420;
  --c-text:         #f0ebe2;
  --c-text-sub:     #b8a898;
  --c-text-muted:   #7a6a5a;
  --c-gold:         #c8a55e;
  --c-gold-dim:     #8a7040;
  --c-red:          #c84a3a;
  --c-green:        #4a8a60;
  --c-border:       rgba(200,165,94,0.18);
  --c-border-strong:rgba(200,165,94,0.45);
  --f-serif: "Hiragino Mincho ProN","Yu Mincho","YuMincho","Georgia",serif;
  --f-sans:  "Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI",system-ui,sans-serif;
  --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:24px; --sp-xl:40px;
  --r-sm:6px; --r-md:12px; --r-lg:20px; --r-pill:999px;
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --dur-fast:120ms; --dur-norm:240ms; --dur-slow:400ms;
}

/* ============================================================
   リセット
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%;
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--f-sans);
  font-size: 16px;
  line-height: 1.5;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ============================================================
   フォーカス
============================================================ */
:focus-visible {
  outline: 2px solid var(--c-gold);
  outline-offset: 3px;
  border-radius: var(--r-sm);
}

/* ============================================================
   スクリーン管理
============================================================ */
.screen {
  display: none;
  position: fixed;
  inset: 0;
  flex-direction: column;
  overflow: hidden;
  background: var(--c-bg);
}
.screen.active {
  display: flex;
  animation: screenFadeIn var(--dur-norm) var(--ease-out) both;
}

@keyframes screenFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* モーション低減 */
@media (prefers-reduced-motion: reduce) {
  .screen.active { animation: none; }
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================================
   C-01 スクリーンセーバー
============================================================ */
#screen-ss {
  justify-content: center;
  align-items: center;
  cursor: pointer;
  user-select: none;
  overflow: hidden;
}
.ss-ripple {
  position: absolute;
  width: 80px;
  height: 80px;
  top: 50%;
  left: 50%;
  margin: -40px;
  border-radius: 50%;
  border: 1px solid rgba(200,165,94,0.3);
  animation: ssRipple 4s ease-out infinite;
  pointer-events: none;
}
.ss-ripple:nth-child(2) { animation-delay: 1s; }
.ss-ripple:nth-child(3) { animation-delay: 2s; }
.ss-ripple:nth-child(4) { animation-delay: 3s; }

@keyframes ssRipple {
  0%   { transform: scale(1);  opacity: 0.8; }
  100% { transform: scale(18); opacity: 0; }
}

.ss-particle {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--c-gold);
  opacity: 0;
  animation: ssParticle 5s ease-in-out infinite;
  pointer-events: none;
}

@keyframes ssParticle {
  0%   { opacity: 0;   transform: translateY(0) scale(0.5); }
  25%  { opacity: 0.7; }
  100% { opacity: 0;   transform: translateY(-220px) scale(0); }
}

.ss-brand {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: var(--sp-lg);
}
.ss-brand h1 {
  font-family: var(--f-serif);
  font-size: clamp(2.8rem, 9vw, 5rem);
  color: var(--c-gold);
  letter-spacing: 0.14em;
  line-height: 1.25;
  text-shadow: 0 0 48px rgba(200,165,94,0.35);
}
.ss-brand .ss-sub {
  margin-top: var(--sp-lg);
  font-size: clamp(0.85rem, 2.5vw, 1.05rem);
  color: var(--c-text-sub);
  letter-spacing: 0.22em;
  animation: ssBlink 2.4s ease-in-out infinite;
}

@keyframes ssBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.35; }
}

/* ============================================================
   共通ヘッダー
============================================================ */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp-lg);
  background: rgba(18,16,14,0.96);
  border-bottom: 1px solid var(--c-border);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  flex-shrink: 0;
  height: 72px;
  gap: var(--sp-md);
}
.header-brand {
  font-family: var(--f-serif);
  font-size: 1.05rem;
  color: var(--c-gold);
  letter-spacing: 0.08em;
  white-space: nowrap;
  flex-shrink: 0;
}
.header-right {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  flex-shrink: 0;
}
.table-badge {
  display: flex;
  align-items: center;
  gap: var(--sp-xs);
  padding: 0 var(--sp-md);
  height: 44px;
  background: var(--c-bg-card);
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-pill);
  font-size: 0.82rem;
  color: var(--c-text-sub);
  white-space: nowrap;
}
.table-badge .tno {
  color: var(--c-gold);
  font-weight: 700;
  font-size: 0.95rem;
}

/* カートボタン */
.cart-btn {
  position: relative;
  width: 64px;
  height: 64px;
  background: none;
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-md);
  color: var(--c-text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform var(--dur-fast) var(--ease-out),
              box-shadow var(--dur-fast) var(--ease-out);
}
.cart-btn:hover  { transform: scale(0.97); box-shadow: 0 0 14px rgba(200,165,94,0.25); }
.cart-btn:active { transform: scale(0.95); }
.cart-btn svg { width: 26px; height: 26px; pointer-events: none; }
.cart-badge {
  position: absolute;
  top: 5px;
  right: 5px;
  min-width: 20px;
  height: 20px;
  background: var(--c-gold);
  color: var(--c-bg);
  border-radius: var(--r-pill);
  font-size: 0.68rem;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  line-height: 1;
}
.cart-badge.show { display: flex; }

/* 戻るボタン */
.back-btn {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  background: none;
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  color: var(--c-text-sub);
  font-family: var(--f-sans);
  font-size: 0.88rem;
  cursor: pointer;
  padding: 0 var(--sp-md);
  height: 44px;
  white-space: nowrap;
  transition: transform var(--dur-fast) var(--ease-out),
              border-color var(--dur-norm);
}
.back-btn:hover  { transform: scale(0.97); border-color: var(--c-border-strong); }
.back-btn:active { transform: scale(0.95); }
.back-btn svg { pointer-events: none; }

/* ============================================================
   C-02 言語選択
============================================================ */
#screen-lang {
  justify-content: center;
  align-items: center;
  padding: var(--sp-xl) var(--sp-lg);
}
.lang-inner {
  text-align: center;
  width: 100%;
  max-width: 480px;
}
.lang-inner h2 {
  font-family: var(--f-serif);
  font-size: clamp(1.1rem, 3.5vw, 1.45rem);
  color: var(--c-text-sub);
  letter-spacing: 0.06em;
  margin-bottom: var(--sp-xl);
}
.lang-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-md);
}
.lang-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80px;
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  color: var(--c-text);
  font-family: var(--f-sans);
  cursor: pointer;
  padding: var(--sp-md);
  gap: 4px;
  transition: transform var(--dur-fast) var(--ease-out),
              border-color var(--dur-norm),
              box-shadow var(--dur-norm);
}
.lang-btn:hover  { transform: scale(0.97); border-color: var(--c-gold); box-shadow: 0 0 18px rgba(200,165,94,0.2); }
.lang-btn:active { transform: scale(0.95); }
.lang-btn .ln  { font-size: 1.15rem; font-weight: 600; }
.lang-btn .ls  { font-size: 0.72rem; color: var(--c-text-muted); }
.lang-full { grid-column: 1 / -1; }

/* ============================================================
   テーブル入力モーダル
============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--c-bg-overlay);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 300;
  padding: var(--sp-xl);
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-lg);
  padding: var(--sp-xl);
  width: 100%;
  max-width: 380px;
  text-align: center;
  animation: screenFadeIn var(--dur-norm) var(--ease-out) both;
}
.modal-box h3 {
  font-family: var(--f-serif);
  font-size: 1.25rem;
  color: var(--c-gold);
  margin-bottom: var(--sp-lg);
  letter-spacing: 0.04em;
}
.modal-input {
  width: 100%;
  min-height: 68px;
  background: var(--c-bg-input);
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-md);
  color: var(--c-text);
  font-family: var(--f-sans);
  font-size: 1.7rem;
  font-weight: 700;
  text-align: center;
  padding: var(--sp-md);
  letter-spacing: 0.08em;
}
.modal-input:focus {
  outline: none;
  border-color: var(--c-gold);
  box-shadow: 0 0 0 3px rgba(200,165,94,0.18);
}
.modal-confirm {
  margin-top: var(--sp-md);
  width: 100%;
  min-height: 64px;
  background: var(--c-gold);
  color: var(--c-bg);
  border: none;
  border-radius: var(--r-md);
  font-family: var(--f-sans);
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: transform var(--dur-fast) var(--ease-out),
              box-shadow var(--dur-fast) var(--ease-out);
}
.modal-confirm:hover  { transform: scale(0.98); box-shadow: 0 0 18px rgba(200,165,94,0.35); }
.modal-confirm:active { transform: scale(0.96); }

/* ============================================================
   C-03 メニュー一覧
============================================================ */
#screen-menu { /* flex-direction: column by .screen */ }

.cat-tabs {
  display: flex;
  overflow-x: auto;
  gap: var(--sp-sm);
  padding: var(--sp-md) var(--sp-lg);
  border-bottom: 1px solid var(--c-border);
  flex-shrink: 0;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  padding: 0 var(--sp-lg);
  min-height: 44px;
  background: none;
  border: 1px solid var(--c-border);
  border-radius: var(--r-pill);
  color: var(--c-text-muted);
  font-family: var(--f-sans);
  font-size: 0.88rem;
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--dur-norm),
              border-color var(--dur-norm),
              transform var(--dur-fast) var(--ease-out);
}
.cat-tab.active {
  color: var(--c-gold);
  border-color: var(--c-gold);
  font-weight: 600;
}
.cat-tab:hover  { transform: scale(0.97); }
.cat-tab:active { transform: scale(0.95); }

.menu-grid {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--sp-lg);
  padding: var(--sp-lg);
  align-content: start;
}
.menu-grid::-webkit-scrollbar { width: 4px; }
.menu-grid::-webkit-scrollbar-thumb { background: var(--c-border-strong); border-radius: 4px; }

/* メニューカード */
.menu-card {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: transform var(--dur-norm) var(--ease-out),
              border-color var(--dur-norm),
              box-shadow var(--dur-norm);
}
.menu-card:not(.is-soldout):hover  {
  transform: scale(0.97);
  border-color: var(--c-border-strong);
  box-shadow: 0 6px 28px rgba(200,165,94,0.13);
}
.menu-card:not(.is-soldout):active { transform: scale(0.95); }
.menu-card.is-soldout {
  opacity: 0.52;
  cursor: default;
}
.card-img {
  width: 100%;
  aspect-ratio: 4/3;
  display: block;
  flex-shrink: 0;
  overflow: hidden;
}
.card-img svg { width: 100%; height: 100%; display: block; }
.card-body {
  padding: var(--sp-md);
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--sp-xs);
}
.card-name {
  font-family: var(--f-serif);
  font-size: 1.05rem;
  color: var(--c-text);
  line-height: 1.3;
}
.card-desc {
  font-size: 0.78rem;
  color: var(--c-text-sub);
  flex: 1;
  line-height: 1.5;
}
.card-price {
  font-family: var(--f-serif);
  font-size: 1.15rem;
  color: var(--c-gold);
  font-weight: 600;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.card-price small {
  font-family: var(--f-sans);
  font-size: 0.7rem;
  color: var(--c-text-muted);
  font-weight: 400;
}
.badge-area {
  position: absolute;
  top: var(--sp-sm);
  left: var(--sp-sm);
  display: flex;
  gap: var(--sp-xs);
  flex-wrap: wrap;
}
.badge {
  padding: 3px var(--sp-sm);
  border-radius: var(--r-pill);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1;
}
.badge-rec     { background: var(--c-green); color: #fff; }
.badge-soldout { background: var(--c-red);   color: #fff; }

/* ============================================================
   C-04 詳細
============================================================ */
#screen-detail { /* flex col */ }

.detail-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.detail-scroll::-webkit-scrollbar { width: 4px; }
.detail-scroll::-webkit-scrollbar-thumb { background: var(--c-border-strong); border-radius: 4px; }
.detail-inner {
  max-width: 600px;
  margin: 0 auto;
  padding: var(--sp-lg) var(--sp-lg) var(--sp-xl);
}
.detail-img {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: var(--sp-lg);
}
.detail-img svg { width: 100%; height: 100%; display: block; }
.detail-name {
  font-family: var(--f-serif);
  font-size: clamp(1.5rem, 4vw, 2rem);
  color: var(--c-text);
  line-height: 1.25;
  margin-bottom: var(--sp-sm);
}
.detail-price {
  font-family: var(--f-serif);
  font-size: clamp(1.6rem, 4vw, 2rem);
  color: var(--c-gold);
  font-weight: 700;
  margin-bottom: var(--sp-md);
  display: flex;
  align-items: baseline;
  gap: var(--sp-sm);
}
.detail-price small {
  font-family: var(--f-sans);
  font-size: 0.85rem;
  color: var(--c-text-muted);
  font-weight: 400;
}
.detail-desc {
  color: var(--c-text-sub);
  font-size: 0.92rem;
  line-height: 1.65;
  margin-bottom: var(--sp-lg);
}

/* アレルギー情報（常時表示） */
.allergen-box {
  background: rgba(200,74,58,0.1);
  border: 1px solid rgba(200,74,58,0.42);
  border-radius: var(--r-md);
  padding: var(--sp-md);
  margin-bottom: var(--sp-lg);
}
.allergen-label {
  display: flex;
  align-items: center;
  gap: var(--sp-xs);
  font-size: 0.76rem;
  font-weight: 700;
  color: var(--c-red);
  letter-spacing: 0.1em;
  margin-bottom: var(--sp-xs);
  text-transform: uppercase;
}
.allergen-label svg { flex-shrink: 0; }
.allergen-text {
  color: var(--c-text);
  font-size: 0.93rem;
  line-height: 1.5;
}

/* オプション */
.options-section { margin-bottom: var(--sp-lg); }
.options-heading {
  font-size: 0.85rem;
  color: var(--c-text-sub);
  letter-spacing: 0.07em;
  margin-bottom: var(--sp-sm);
}
.option-list {
  display: flex;
  flex-direction: column;
  gap: var(--sp-sm);
}
.option-label {
  display: flex;
  align-items: center;
  gap: var(--sp-md);
  padding: 0 var(--sp-md);
  min-height: 64px;
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: border-color var(--dur-norm),
              transform var(--dur-fast) var(--ease-out);
}
.option-label:hover  { border-color: var(--c-gold); transform: scale(0.99); }
.option-label:active { transform: scale(0.97); }
.option-radio {
  appearance: none;
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border: 2px solid var(--c-gold);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
  transition: background var(--dur-norm);
}
.option-radio:checked::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--c-gold);
}
.option-text {
  font-size: 0.93rem;
  color: var(--c-text);
  flex: 1;
  pointer-events: none;
}

/* カートに追加ボタン */
.add-cart-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-sm);
  width: 100%;
  min-height: 68px;
  background: var(--c-gold);
  color: var(--c-bg);
  border: none;
  border-radius: var(--r-md);
  font-family: var(--f-sans);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.06em;
  margin-top: var(--sp-sm);
  transition: transform var(--dur-fast) var(--ease-out),
              box-shadow var(--dur-fast) var(--ease-out);
}
.add-cart-btn:hover  { transform: scale(0.98); box-shadow: 0 0 22px rgba(200,165,94,0.4); }
.add-cart-btn:active { transform: scale(0.96); }
.add-cart-btn svg { pointer-events: none; }

/* ============================================================
   C-05 カート
============================================================ */
#screen-cart { /* flex col */ }
.cart-header-title {
  font-family: var(--f-serif);
  font-size: 1.05rem;
  color: var(--c-gold);
}
.cart-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.cart-scroll::-webkit-scrollbar { width: 4px; }
.cart-scroll::-webkit-scrollbar-thumb { background: var(--c-border-strong); border-radius: 4px; }
.cart-inner {
  max-width: 600px;
  margin: 0 auto;
  padding: var(--sp-lg) var(--sp-lg) var(--sp-xl);
}
.cart-empty {
  text-align: center;
  padding: calc(var(--sp-xl) * 2) var(--sp-lg);
  color: var(--c-text-muted);
  font-size: 1rem;
}
.cart-item {
  display: flex;
  align-items: center;
  gap: var(--sp-md);
  padding: var(--sp-md);
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-md);
}
.ci-thumb {
  width: 72px;
  height: 72px;
  border-radius: var(--r-sm);
  overflow: hidden;
  flex-shrink: 0;
}
.ci-thumb svg { width: 100%; height: 100%; display: block; }
.ci-info { flex: 1; min-width: 0; }
.ci-name {
  font-size: 0.93rem;
  font-weight: 600;
  color: var(--c-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

/* ============================================================

============================================================ */
function t(key) {
  const d = I18N[ST.lang] || I18N.ja;
  return d[key] !== undefined ? d[key] : key;
}

function menuText(obj) {
  return obj[ST.lang] || obj.ja || '';
}

/* ============================================================
   SVG PLACEHOLDER (土鍋シルエット)
============================================================ */
const POT_PALETTE = {
  m01: ['#7a5a12','#c8a03a','#3a2a06'],
  m02: ['#9b6010','#e8c040','#5a3808'],
  m03: ['#5a3e1e','#a07240','#2a1808'],
  m04: ['#6a2e1e','#b06040','#3a1208'],
  m05: ['#1e3c3a','#4a8080','#0a2020'],
  m06: ['#2e2c18','#5a5830','#0e0e04'],
  m07: ['#283c20','#527840','#0a2008'],
  m08: ['#281e4e','#504478','#100828']
};

function potSVG(id, w, h) {
  const [dark, mid, shade] = POT_PALETTE[id] || ['#2a2018','#6a5030','#1a1008'];
  const W = w, H = h;
  return [
    '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">',
    '<rect width="' + W + '" height="' + H + '" fill="' + shade + '"/>',
    /* steam lines */
    '<path d="M' + (W*.35) + ',' + (H*.2) + ' Q' + (W*.3) + ',' + (H*.07) + ' ' + (W*.35) + ',0"',
    '  stroke="' + mid + '" stroke-width="1.5" fill="none" opacity="0.45"/>',
    '<path d="M' + (W*.5) + ',' + (H*.16) + ' Q' + (W*.45) + ',' + (H*.05) + ' ' + (W*.5) + ',0"',
    '  stroke="' + mid + '" stroke-width="1.5" fill="none" opacity="0.45"/>',
    '<path d="M' + (W*.65) + ',' + (H*.2) + ' Q' + (W*.6) + ',' + (H*.07) + ' ' + (W*.65) + ',0"',
    '  stroke="' + mid + '" stroke-width="1.5" fill="none" opacity="0.45"/>',
    /* lid */
    '<ellipse cx="' + (W*.5) + '" cy="' + (H*.3) + '"',
    '  rx="' + (W*.32) + '" ry="' + (H*.045) + '"',
    '  fill="' + dark + '" stroke="' + mid + '" stroke-width="1.5"/>',
    /* lid knob */
    '<ellipse cx="' + (W*.5) + '" cy="' + (H*.26) + '"',
    '  rx="' + (W*.065) + '" ry="' + (H*.045) + '" fill="' + mid + '"/>',
    /* body rim */
    '<ellipse cx="' + (W*.5) + '" cy="' + (H*.35) + '"',
    '  rx="' + (W*.33) + '" ry="' + (H*.048) + '" fill="' + mid + '" opacity="0.55"/>',
    /* body rect */
    '<rect x="' + (W*.17) + '" y="' + (H*.35) + '"',
    '  width="' + (W*.66) + '" height="' + (H*.36) + '"',
    '  rx="' + (W*.05) + '" fill="' + dark + '"/>',
    /* body base ellipse */
    '<ellipse cx="' + (W*.5) + '" cy="' + (H*.71) + '"',
    '  rx="' + (W*.33) + '" ry="' + (H*.048) + '"',
    '  fill="' + dark + '" stroke="' + mid + '" stroke-width="1"/>',
    /* handles */
    '<rect x="' + (W*.09) + '" y="' + (H*.42) + '"',
    '  width="' + (W*.08) + '" height="' + (H*.14) + '"',
    '  rx="' + (W*.025) + '" fill="' + mid + '" opacity="0.65"/>',
    '<rect x="' + (W*.83) + '" y="' + (H*.42) + '"',
    '  width="' + (W*.08) + '" height="' + (H*.14) + '"',
    '  rx="' + (W*.025) + '" fill="' + mid + '" opacity="0.65"/>',
    /* shine */
    '<ellipse cx="' + (W*.37) + '" cy="' + (H*.45) + '"',
    '  rx="' + (W*.07) + '" ry="' + (H*.035) + '"',
    '  fill="rgba(255,255,255,0.055)"',
    '  transform="rotate(-20,' + (W*.37) + ',' + (H*.45) + ')"/>',
    /* ground shadow */
    '<ellipse cx="' + (W*.5) + '" cy="' + (H*.88) + '"',
    '  rx="' + (W*.28) + '" ry="' + (H*.024) + '"',
    '  fill="rgba(0,0,0,0.32)"/>',
    '</svg>'
  ].join('');
}

/* ============================================================
   SCREENSAVER / IDLE
============================================================ */
let _idleTimer = null;
const IDLE_MS = 30000;

function resetIdle() {
  clearTimeout(_idleTimer);
  if (!ST.ssActive) {
    _idleTimer = setTimeout(activateSS, IDLE_MS);
  }
}

function activateSS() {
  ST.ssActive = true;
  _rawShow('ss');
}

function dismissSS() {
  ST.ssActive = false;
  resetIdle();
  if (ST.isFirstVisit) {
    _rawShow('lang');
    document.getElementById('lang-heading').textContent = t('tapToStart') === 'tapToStart'
      ? '言語を選択してください' : t('tapToStart');
  } else {
    showScreen('menu');
  }
}

/* ============================================================
   SCREEN MANAGEMENT
============================================================ */
function _rawShow(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
  });
  const el = document.getElementById('screen-' + id);
  if (!el) return;
  el.offsetHeight; // reflow for animation reset
  el.classList.add('active');
  // Reset scroll position
  const scrollable = el.querySelector('.detail-scroll, .cart-scroll, .menu-grid');
  if (scrollable) scrollable.scrollTop = 0;
}

function showScreen(id) {
  resetIdle();
  if (id === 'menu')   renderMenu();
  if (id === 'cart')   renderCart();
  _rawShow(id);
  syncTableDisplay();
  syncCartBadges();
}

function navToCart() {
  showScreen('cart');
}

/* ============================================================
   LANGUAGE
============================================================ */
function selectLang(lang) {
  ST.lang = lang;
  document.documentElement.lang = lang;
  localStorage.setItem('pokapoka_lang', lang);
  ST.isFirstVisit = false;
  afterLang();
}

function afterLang() {
  if (!ST.tableNo) {
    _rawShow('menu');
    renderMenu();
    syncCartBadges();
    syncTableDisplay();
    showTableModal();
  } else {
    showScreen('menu');
  }
}

/* ============================================================
   TABLE NUMBER
============================================================ */
function showTableModal() {
  const m = document.getElementById('modal-table');
  document.getElementById('modal-table-h').textContent   = t('enterTable');
  document.getElementById('table-confirm').textContent   = t('confirm');
  document.getElementById('table-input').value = '';
  m.classList.add('show');
  setTimeout(() => document.getElementById('table-input').focus(), 100);
}

function hideTableModal() {
  document.getElementById('modal-table').classList.remove('show');
}

function confirmTable() {
  const v = document.getElementById('table-input').value.trim();
  if (!v) { document.getElementById('table-input').focus(); return; }
  ST.tableNo = v;
  localStorage.setItem('pokapoka_table', v);
  hideTableModal();
  showScreen('menu');
}

function syncTableDisplay() {
  const no  = ST.tableNo || '--';
  const lbl = t('tableNo');
  [['menu-tbl-lbl','menu-tbl-no'],
   ['detail-tbl-lbl','detail-tbl-no'],
   ['cart-tbl-lbl','cart-tbl-no']].forEach(([lId, nId]) => {
    const lEl = document.getElementById(lId);
    const nEl = document.getElementById(nId);
    if (lEl) lEl.textContent = lbl;
    if (nEl) nEl.textContent = no;
  });
}

/* ============================================================
   CART BADGE SYNC
============================================================ */
function syncCartBadges() {
  const total = ST.cart.reduce((s, c) => s + c.qty, 0);
  document.querySelectorAll('.cart-badge').forEach(el => {
    el.textContent = total > 0 ? total : '';
    if (total > 0) el.classList.add('show');
    else           el.classList.remove('show');
  });
}

/* ============================================================
   MENU RENDERING
============================================================ */
function renderMenu() {
  renderCatTabs();
  renderMenuGrid();
  // Update i18n for back/cart in other headers
  const backEls = document.querySelectorAll('#detail-back span, #cart-back span');
  backEls.forEach(el => { el.textContent = t('back'); });
  document.getElementById('cart-title').textContent = t('cart');
}

function renderCatTabs() {
  const container = document.getElementById('cat-tabs');
  container.innerHTML = CATS.map(cat => {
    const label = t(cat.labelKey);
    const active = ST.activeCat === cat.id ? ' active' : '';
    return '<button class="cat-tab' + active + '"' +
           ' role="tab" aria-selected="' + (ST.activeCat === cat.id) + '"' +
           ' onclick="setCat(\'' + cat.id + '\')">' +
           escHtml(label) + '</button>';
  }).join('');
}

function setCat(catId) {
  ST.activeCat = catId;
  renderCatTabs();
  renderMenuGrid();
}

function renderMenuGrid() {
  const grid = document.getElementById('menu-grid');
  const filtered = ST.activeCat === 'all'
    ? MENU
    : MENU.filter(m => m.category === ST.activeCat);

  grid.innerHTML = filtered.map(m => {
    const name   = escHtml(menuText(m.name));
    const desc   = escHtml(menuText(m.desc));
    const img    = potSVG(m.id, 320, 240);
    const recLbl = escHtml(t('recommended'));
    const soLbl  = escHtml(t('soldOut'));
    const solCls = m.soldOut ? ' is-soldout' : '';
    const clkAttr = m.soldOut
      ? ''
      : ' onclick="openDetail(\'' + m.id + '\')"' +
        ' onkeydown="if(event.key===\'Enter\'||event.key===\' \')openDetail(\'' + m.id + '\')"';

    return '<article class="menu-card' + solCls + '"' +
           ' role="listitem"' +
           ' tabindex="' + (m.soldOut ? '-1' : '0') + '"' +
           ' aria-label="' + name + ' ¥' + m.price.toLocaleString() + '"' +
           clkAttr + '>' +
           '<div class="badge-area">' +
           (m.recommended ? '<span class="badge badge-rec">' + recLbl + '</span>' : '') +
           (m.soldOut     ? '<span class="badge badge-soldout">' + soLbl + '</span>' : '') +
           '</div>' +
           '<div class="card-img">' + img + '</div>' +
           '<div class="card-body">' +
           '<div class="card-name">' + name + '</div>' +
           '<div class="card-desc">' + desc + '</div>' +
           '<div class="card-price">¥' + m.price.toLocaleString() +
           '<small>' + escHtml(t('tax')) + '</small></div>' +
           '</div></article>';
  }).join('');
}

/* ============================================================
   DETAIL
============================================================ */
function openDetail(menuId) {
  const menu = MENU.find(m => m.id === menuId);
  if (!menu || menu.soldOut) return;
  buildDetail(menu);
  showScreen('detail');
}

function buildDetail(menu) {
  const name      = escHtml(menuText(menu.name));
  const desc      = escHtml(menuText(menu.desc));
  const allergens = escHtml(menuText(menu.allergens));
  const img       = potSVG(menu.id, 600, 338);

  // Options HTML
  let optsHtml = '';
  if (menu.options.length > 0) {
    const optsItems = menu.options.map((opt, i) => {
      const esc = escHtml(opt);
      return '<label class="option-label">' +
             '<input class="option-radio" type="radio" name="detail-opt"' +
             ' value="' + esc + '"' + (i === 0 ? ' checked' : '') + '>' +
             '<span class="option-text">' + esc + '</span>' +
             '</label>';
    }).join('');
    optsHtml = '<div class="options-section">' +
               '<div class="options-heading">' + escHtml(t('options')) + '</div>' +
               '<div class="option-list" role="radiogroup" aria-label="' + escHtml(t('options')) + '">' +
               optsItems + '</div></div>';
  }

  // Update back button text
  document.getElementById('detail-back').querySelector('span').textContent = t('back');

  document.getElementById('detail-inner').innerHTML =
    '<div class="detail-img">' + img + '</div>' +
    '<h1 class="detail-name">' + name + '</h1>' +
    '<div class="detail-price">¥' + menu.price.toLocaleString() +
    '<small>' + escHtml(t('tax')) + '</small></div>' +
    '<p class="detail-desc">' + desc + '</p>' +
    '<div class="allergen-box" role="note">' +
    '<div class="allergen-label">' +
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"' +
    ' stroke-width="2.5" stroke-linecap="round" aria-hidden="true">' +
    '<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>' +
    '<line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>' +
    '</svg>' + escHtml(t('allergens')) + '</div>' +
    '<div class="allergen-text">' + allergens + '</div>' +
    '</div>' +
    optsHtml +
    '<button class="add-cart-btn" onclick="addToCart(\'' + menu.id + '\')">' +
    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"' +
    ' stroke-width="2" aria-hidden="true">' +
    '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' +
    '</svg>' + escHtml(t('addToCart')) + '</button>';
}

/* ============================================================
   CART MANAGEMENT
============================================================ */
function addToCart(menuId) {
  const menu = MENU.find(m => m.id === menuId);
  if (!menu) return;

  let selectedOption = '';
  const radios = document.querySelectorAll('input[name="detail-opt"]');
  radios.forEach(r => { if (r.checked) selectedOption = r.value; });

  const existing = ST.cart.find(c =>
    c.menu.id === menuId && c.selectedOption === selectedOption
  );
  if (existing) {
    existing.qty += 1;
  } else {
    ST.cart.push({ menu, qty: 1, selectedOption });
  }
  syncCartBadges();
  showScreen('menu');
}

function renderCart() {
  const inner = document.getElementById('cart-inner');
  document.getElementById('cart-title').textContent      = t('cart');
  document.getElementById('cart-back').querySelector('span').textContent = t('back');

  if (ST.cart.length === 0) {
    inner.innerHTML = '<div class="cart-empty">' + escHtml(t('cartEmpty')) + '</div>';
    return;
  }

  const subtotal = ST.cart.reduce((s, c) => s + c.menu.price * c.qty, 0);
  const taxAmt   = Math.floor(subtotal * 0.1);
  const grand    = subtotal + taxAmt;

  const itemsHtml = ST.cart.map((item, idx) => {
    const name  = escHtml(menuText(item.menu.name));
    const thumb = potSVG(item.menu.id, 72, 72);
    const line  = item.menu.price * item.qty;
    const optHtml = item.selectedOption
      ? '<div class="ci-opt">' + escHtml(item.selectedOption) + '</div>'
      : '';
    return '<div class="cart-item" role="listitem">' +
           '<div class="ci-thumb">' + thumb + '</div>' +
           '<div class="ci-info">' +
           '<div class="ci-name">' + name + '</div>' +
           optHtml +
           '<div class="ci-price">¥' + line.toLocaleString() + '</div>' +
           '</div>' +
           '<div class="ci-controls">' +
           '<button class="qty-btn"' +
           ' onclick="changeQty(' + idx + ', 1)"' +
           ' aria-label="' + escHtml(t('increase')) + '">＋</button>' +
           '<span class="qty-num" aria-label="' + escHtml(t('qty')) + ' ' + item.qty + '">' + item.qty + '</span>' +
           '<button class="qty-btn"' +
           ' onclick="changeQty(' + idx + ', -1)"' +
           ' aria-label="' + escHtml(t('decrease')) + '">−</button>' +
           '<button class="del-btn"' +
           ' onclick="removeItem(' + idx + ')"' +
           ' aria-label="' + escHtml(t('remove')) + '">✕</button>' +
           '</div></div>';
  }).join('');

  inner.innerHTML =
    '<div role="list">' + itemsHtml + '</div>' +
    '<div class="cart-total">' +
    '<div class="total-row"><span>' + escHtml(t('subtotal')) + '</span>' +
    '<span class="amount">¥' + subtotal.toLocaleString() + '</span></div>' +
    '<div class="total-row"><span>' + escHtml(t('taxLine')) + '</span>' +
    '<span class="amount">¥' + taxAmt.toLocaleString() + '</span></div>' +
    '<div class="total-row grand"><span>' + escHtml(t('total')) + ' ' + escHtml(t('tax')) + '</span>' +
    '<span class="amount">¥' + grand.toLocaleString() + '</span></div>' +
    '</div>' +
    '<button class="order-btn"' +
    (ST.cart.length === 0 ? ' disabled' : '') +
    ' onclick="placeOrder()">' + escHtml(t('placeOrder')) + '</button>';
}

function changeQty(idx, delta) {
  const item = ST.cart[idx];
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  renderCart();
  syncCartBadges();
}

function removeItem(idx) {
  ST.cart.splice(idx, 1);
  renderCart();
  syncCartBadges();
}

/* ============================================================
   KDS SUBMISSION (spec 通り)
============================================================ */
function submitToKDS(tableNo, people, cartItems, lang) {
  const order = {
    id: 'tab-' + Date.now(),
    table: tableNo,
    type: 'new',
    start: Date.now(),
    people: people,
    items: cartItems.map(c => ({
      name: c.menu.name[lang] || c.menu.name.ja,
      qty: c.qty,
      options: c.selectedOption || '',
      done: false
    }))
  };
  const existing = JSON.parse(localStorage.getItem('KDS_ORDERS') || '[]');
  existing.push(order);
  localStorage.setItem('KDS_ORDERS', JSON.stringify(existing));
  try {
    const bc = new BroadcastChannel('kds-sync');
    bc.postMessage({ type: 'NEW_ORDER', order });
    bc.close();
  } catch (e) { /* BroadcastChannel not supported */ }
}

function placeOrder() {
  if (ST.cart.length === 0) return;
  submitToKDS(ST.tableNo, 0, ST.cart, ST.lang);
  ST.cart = [];
  syncCartBadges();
  showComplete();
}

function showComplete() {
  document.getElementById('cmp-title').textContent = t('orderDone');
  document.getElementById('cmp-msg').innerHTML =
    '<p>' + escHtml(t('orderSent')) + '</p>' +
    '<p style="margin-top:6px;">' + escHtml(t('preparing')) + '</p>' +
    '<p class="wait">' + escHtml(t('waitTime')) + '</p>';
  document.getElementById('cmp-more').querySelector('span').textContent = t('addMore');
  syncTableDisplay();
  _rawShow('complete');
}

function addMoreOrder() {
  showScreen('menu');
}

/* ============================================================
   UTILITY
============================================================ */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ============================================================
   INIT
============================================================ */
function init() {
  // 1. URL パラメータ確認
  const params = new URLSearchParams(window.location.search);
  const tParam = params.get('table');
  if (tParam) {
    ST.tableNo = tParam;
    localStorage.setItem('pokapoka_table', tParam);
  } else {
    const saved = localStorage.getItem('pokapoka_table');
    if (saved) ST.tableNo = saved;
  }

  // 2. 保存言語復元
  const savedLang = localStorage.getItem('pokapoka_lang');
  if (savedLang && I18N[savedLang]) {
    ST.lang = savedLang;
    document.documentElement.lang = savedLang;
    ST.isFirstVisit = false;
  }

  // 3. スクリーンセーバーパーティクル生成
  buildSSParticles();

  // 4. スクリーンセーバーのタップ解除
  const ssEl = document.getElementById('screen-ss');
  ssEl.addEventListener('click', dismissSS);
  ssEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dismissSS(); }
  });

  // 5. グローバルアイドル検知
  ['click','touchstart','keydown','mousemove','scroll'].forEach(ev => {
    document.addEventListener(ev, resetIdle, { passive: true });
  });

  // 6. テーブルモーダル Enter キー
  document.getElementById('table-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmTable();
  });
  document.getElementById('table-confirm').addEventListener('click', confirmTable);

  // 7. スクリーンセーバーのタップ文言を言語に合わせる
  document.getElementById('ss-tap').textContent = t('tapToStart');

  syncTableDisplay();
}

function buildSSParticles() {
  const ssEl = document.getElementById('screen-ss');
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'ss-particle';
    p.style.left             = (Math.random() * 86 + 7) + '%';
    p.style.bottom           = (Math.random() * 35) + '%';
    p.style.animationDelay   = (Math.random() * 6) + 's';
    p.style.animationDuration = (3.5 + Math.random() * 4) + 's';
    p.style.width = p.style.height = (2 + Math.random() * 2) + 'px';
    ssEl.appendChild(p);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

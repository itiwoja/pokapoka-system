<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>KDS - 土鍋飯ぽかぽか厨房</title>
<style>
  /* ============================================================
     デザイントークン — 産業用KDS (完全機能特化・無機質)
     方向性: 中間グレーの無彩色地・白カード・影ゼロ・細枠。
     色は「意味」にのみ使う:
       緊急度 = ヘッダー帯を高彩度で塗る (緑→黄→赤・経過でカウントアップ)
       種別   = 低彩度の左縁 + チップ (新規=藍水色 / 予約=金)
       赤は経過警告(10分+)専用。厨房の距離から一瞬で状態を読ませる。
     ============================================================ */
  :root {
    /* ═══ 盤面: 明るく締まったクール無彩 (旧 #D6D9DD の濁り解消) ═══ */
    --bg-board:  #E9ECEF;   /* 盤面地 */
    --bg-raise:  #F4F5F7;   /* HUD帯・淡い面 */
    --bg-inset:  #DFE3E7;   /* 溝・進捗トラック */

    /* ═══ クローム: 黒はヘッダー/予約頭のみ (盤面は白) ═══ */
    --chrome:      #1A1A1A;
    --chrome-2:    #2A2E33;
    --chrome-line: #3A3F45;
    --on-chrome:     #FFFFFF;
    --on-chrome-dim: #B8BDC4;

    /* ═══ カード面 = 種別を「面(背景トーン)」で一撃判別 (#113) ═══ */
    --card:          #FFFFFF;   /* 汎用白 (モーダル等) */
    --card-new:      #DDECFA;   /* 新規 = クール淡青 (盤面グレーより明確に青寄り) */
    --card-reserved: #FBECC0;   /* 予約 = ウォーム淡金 (青と暖色対比で瞬時に別種と判る) */

    /* ═══ テキスト ═══ */
    --text-primary:   #14161A;
    --text-secondary: #565B61;
    --text-muted:     #868C94;

    /* ═══ ボーダー (明盤面向けに軽量化 + 定義用 strong) ═══ */
    --border:        #C2C7CD;
    --border-strong: #9098A0;
    --border-soft:   #E2E5E9;
    --border-hair:   #ECEEF1;

    /* ═══ 種別 = 控えめ2軸 (Okage の頭直下色下線を種別軸へ) ═══ */
    --type-new:          #2A6A8C;  /* 新規 = 藍水色 */
    --type-new-soft:     #E4F0F5;
    --type-reserved:     #6E5300;  /* 予約 = 金 (本文用・soft地/白/盤面で4.5:1+) */
    --type-reserved-edge:#A97F26;  /* 予約 = 金 (縁・チップ・非テキスト3:1+) */
    --type-reserved-soft:#F5EEDA;

    /* ═══ 緊急度 = 帯を塗る唯一の強色 (赤は10分+専用・死守) ═══ */
    --u-ok:    #178235;  --on-u-ok:    #FFFFFF;   /* 白の小文字で4.5:1+ を確保 */
    --u-warn:  #F2A100;  --on-u-warn:  #14161A;   /* 琥珀地は濃文字でAA */
    --u-alert: #D62F26;  --on-u-alert: #FFFFFF;

    /* ═══ 主要CTA = オレンジ (赤hueと分離・ぽかぽか温感)。白文字でAA4.5:1確保のため#C25200 ═══ */
    --cta:       #C25200;   /* white on this = 4.67:1 (AA) */
    --cta-hover: #A84800;
    --cta-soft:  #FDE9D6;
    --on-cta:    #FFFFFF;

    /* ═══ 署名: 黒塗り数量box ═══ */
    --qty-box: #14161A;
    --qty-num: #FFFFFF;

    /* ═══ タイポスケール (距離可読・数字巨大化) ═══ */
    --fz-table:   48px;   /* 卓番 特大 */
    --fz-elapsed: 34px;   /* 経過 */
    --fz-item:    23px;   /* 品名 (要件22px+) */
    --fz-qty:     20px;   /* 黒塗りbox内数字 */
    --fz-clock:   32px;   /* ヘッダー時計 */

    /* ═══ 影 (のっぺり解消・清潔な浮き) ═══ */
    --sh-card:   0 1px 2px rgba(16,18,22,.10), 0 2px 6px rgba(16,18,22,.08);
    --sh-pop:    0 6px 20px rgba(16,18,22,.22);
    --sh-chrome: 0 2px 0 rgba(0,0,0,.35);

    /* ═══ 余白・角丸・グリッド ═══ */
    --gap-card:  12px;
    --pad-card:  12px;
    --pad-shell: 16px;
    --row-item:  64px;    /* 品目タップ域 */
    --col-min:   264px;   /* 折返し下限: 幅追従で右余白解消 */
    --r-card: 8px; --r-chip: 4px; --r-box: 5px; --r-pill: 999px;

    --focus: #2A6A8C;

    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
               "Noto Sans CJK JP", "Noto Sans", "Yu Gothic", Meiryo, sans-serif;
    --font-num: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;

    /* ═══ 旧トークン互換エイリアス (既存CSSを新パレットへ自動追従) ═══ */
    --bg-base:         var(--bg-board);
    --accent-new:      var(--type-new);
    --accent-reserved: var(--type-reserved);
    --elapsed-ok:      var(--u-ok);
    --elapsed-warn:    var(--u-warn);
    --elapsed-alert:   var(--u-alert);
    --on-ok:    var(--on-u-ok);
    --on-warn:  var(--on-u-warn);
    --on-alert: var(--on-u-alert);
    --sh:    var(--sh-card);
    --sh-sm: var(--sh-card);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-ui);
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ============================================================ ヘッダー */
  header {
    position: relative;
    z-index: 3;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 60px;
    padding: 0 var(--pad-shell);
    background: var(--chrome);
    color: var(--on-chrome);
    box-shadow: var(--sh-chrome);
    overflow-x: auto;          /* 狭幅でツール群が溢れてもページ横スクロールを出さない */
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 0;
  }
  .brand .mark {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.02em;
    white-space: nowrap;
    color: var(--on-chrome);
  }
  .brand .mark .accent { color: var(--cta); }   /* ぽかぽか = 温感オレンジ */
  .brand .sub {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--on-chrome-dim);
    font-weight: 700;
    white-space: nowrap;
  }

  .clock {
    order: -1;                        /* 時計を最左のヒーローに (Okage) */
    font-family: var(--font-num);
    font-size: var(--fz-clock);
    font-weight: 800;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--on-chrome);
    background: transparent;
    border: 0;
    padding: 0;
  }
  .clock .sec { color: var(--on-chrome-dim); font-size: 20px; }

  /* ===================== #13 レーン表示（カテゴリ別） ===================== */
  .lanes {
    display: none;   /* 既定はグリッド表示。body.view-lane で表示 */
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    height: 100%;
    min-height: 0;
  }
  body.view-lane #board,
  body.view-lane #empty { display: none !important; }
  body.view-lane .lanes { display: grid; }

  .lane {
    display: flex;
    flex-direction: column;
    min-height: 0;
    border: 3px solid var(--border);
    background: var(--bg-base);
  }
  .lane-head {
    margin: 0;
    padding: 10px 12px;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    border-bottom: 3px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lane[data-cat="rice"]  .lane-head { background: #FDEBCF; }
  .lane[data-cat="side"]  .lane-head { background: #E9F0D8; }
  .lane[data-cat="drink"] .lane-head { background: #DCECF2; }
  .lane-count {
    margin-left: auto;
    font-family: var(--font-num);
    font-size: 16px;
    min-width: 30px;
    text-align: center;
    border: 2px solid var(--border);
    padding: 0 6px;
    background: var(--bg-base);
  }
  .lane-body {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .lane-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 2px solid var(--border);
    border-left-width: 6px;
    background: var(--card-new);
    cursor: pointer;
    text-align: left;
    font: inherit;
    color: var(--text-primary);
    transition: box-shadow .1s ease, transform .05s ease;
  }
  .lane-item:hover  { box-shadow: var(--sh-card); border-color: var(--border-strong); }
  .lane-item:active { box-shadow: none; transform: translateY(1px); }
  .lane-item.reserved { background: var(--card-reserved); }
  .lane-item.lvl-warn  { border-left-color: var(--elapsed-warn); }
  .lane-item.lvl-alert { border-left-color: var(--elapsed-alert); }
  .lane-table {
    font-family: var(--font-num);
    font-weight: 800;
    font-size: 16px;
    min-width: 36px;
    padding: 2px 6px;
    border: 2px solid var(--border);
    background: var(--bg-base);
    text-align: center;
  }
  .lane-item.reserved .lane-table { border-color: var(--accent-reserved); color: var(--accent-reserved); }
  .lane-body .lane-name { font-size: 16px; font-weight: 700; line-height: 1.25; }
  .lane-opt  { display: block; font-size: 12px; font-weight: 700; color: var(--accent-reserved); margin-top: 2px; }
  .lane-min  { display: inline-block; margin-left: 6px; font-size: 11px; color: var(--text-secondary); font-weight: 700; }
  .lane-min.lvl-alert { color: var(--elapsed-alert); }
  .lane-qty {
    font-family: var(--font-num);
    font-size: 18px;
    font-weight: 800;
    min-width: 42px;
    text-align: right;
  }
  .lane-empty {
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 700;
    padding: 16px 8px;
    text-align: center;
  }

  /* 権限モード切替 */
  .mode-switch {
    display: flex;
    gap: 0;
    flex: 0 0 auto;
    height: 44px;
    border: 1px solid var(--chrome-line);
    border-radius: var(--r-pill);
    overflow: hidden;
    background: var(--chrome-2);
  }
  header > .mode-switch:first-of-type { margin-left: auto; }  /* 以降のツール群を右へ */
  .mode-btn {
    min-width: 84px;
    min-height: 44px;
    padding: 0 16px;
    border: 0;
    border-radius: 0;
    background: transparent;
    color: var(--on-chrome-dim);
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .04em;
    cursor: pointer;
    transition: background-color .12s ease, color .12s ease;
  }
  .mode-btn + .mode-btn { border-left: 1px solid var(--chrome-line); }
  .mode-btn:hover  { color: var(--on-chrome); }
  .mode-btn:active { transform: translateY(1px); }
  .mode-btn[aria-pressed="true"] {
    color: var(--chrome);
    background: #fff;
  }
  /* ヘッダー右側トグル (自動印刷 / 通知音) */
  .head-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    padding: 0 14px;
    border: 1px solid var(--chrome-line);
    border-radius: var(--r-pill);
    background: var(--chrome-2);
    color: var(--on-chrome-dim);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    flex: 0 0 auto;
    transition: color .12s ease, background-color .12s ease, border-color .12s ease;
  }
  .head-toggle:hover { color: var(--on-chrome); background: #3A3F45; }
  .head-toggle:active { transform: translateY(1px); }
  .head-toggle .dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--on-chrome-dim);
    background: transparent;
    transition: background-color .12s ease, border-color .12s ease;
  }
  .head-toggle[aria-pressed="true"] {
    color: #fff;
    background: var(--type-new);
    border-color: var(--type-new);
  }
  .head-toggle[aria-pressed="true"] .dot { background: #fff; border-color: #fff; }

  :focus-visible { outline: 3px solid var(--focus); outline-offset: 1px; }

  /* ============================================================ HUD (ヘッダー下サマリー帯)
     進行中件数・10分超過件数・まもなく予約件数 + コンロ1〜10の全カード横断ビュー。
     遠目からでも厨房全体の逼迫度が一目でわかる。 */
  .hud {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 52px;
    padding: 0 var(--pad-shell);
    background: var(--bg-raise);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .hud-stat {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    height: 36px;
    padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: var(--r-chip);
    background: #FFFFFF;
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .hud-stat .k {
    font-size: 11px;
    letter-spacing: .1em;
    font-weight: 800;
    color: var(--text-secondary);
    align-self: center;
  }
  .hud-stat .v {
    font-family: var(--font-num);
    font-size: 22px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
  }
  .hud-stat.alert-on {
    background: var(--u-alert);
    border-color: var(--u-alert);
  }
  .hud-stat.alert-on .k, .hud-stat.alert-on .v { color: #FFFFFF; }
  /* 琥珀地は白文字だと AA 未達のため濃炭文字にする */
  .hud-stat.warn-on {
    background: var(--u-warn);
    border-color: var(--u-warn);
  }
  .hud-stat.warn-on .k, .hud-stat.warn-on .v { color: var(--on-u-warn); }
  .hud-sep { width: 1px; align-self: stretch; margin: 8px 2px; background: var(--border); flex: 0 0 auto; }

  .konro-hud { display: flex; align-items: center; gap: 4px; flex: 0 0 auto; }
  .konro-hud .kh-label {
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--text-secondary); font-weight: 800; margin-right: 4px;
  }
  .kh-cell {
    width: 30px; height: 30px;
    display: inline-grid; place-items: center;
    border: 1px solid var(--border);
    border-radius: var(--r-chip);
    background: #FFFFFF;
    font-family: var(--font-num);
    font-size: 14px; font-weight: 900;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }
  .kh-cell[data-state="white"] { background: var(--text-primary); border-color: var(--text-primary); color: #FFFFFF; }
  .kh-cell[data-state="red"]   { background: var(--u-alert); border-color: var(--u-alert); color: #FFFFFF; }

  /* ============================================================ 2ペインシェル (左=メイン配膳 / 右=予約ストック) */
  .shell {
    position: relative;
    z-index: 1;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: stretch;
  }

  /* 左 = メイン配膳エリア (折り返しグリッド・縦スクロール) */
  main {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding: var(--pad-shell);
    -webkit-overflow-scrolling: touch;
  }

  /* 折り返し複数列グリッド: メイン領域幅に応じて 300px 列を auto-fill。
     各カードは自前の高さ (grid-auto-rows:max-content)。新着は末尾(行優先)へ。縦スクロール。 */
  .board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--col-min), 1fr));  /* 幅追従で右余白ゼロ・5-6列に伸縮 */
    grid-auto-rows: max-content;
    gap: var(--gap-card);
    align-content: start;
    height: 100%;
  }

  /* 空状態ガイド */
  .empty {
    display: none;
    position: absolute;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    color: var(--text-secondary);
    padding: 24px;
  }
  body.is-empty .empty { display: flex; }
  .empty .big { font-size: 22px; font-weight: 900; color: var(--text-primary); letter-spacing: .02em; }
  .empty .demo-btn {
    min-height: 56px;
    padding: 12px 24px;
    border: 0;
    border-radius: var(--r-chip);
    background: var(--cta);
    color: #fff;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: var(--sh-card);
    transition: background-color .12s ease, transform .1s ease;
  }
  .empty .demo-btn:hover { background: var(--cta-hover); }
  .empty .demo-btn:active { transform: translateY(1px); }

  /* ============================================================ カード */
  .card {
    grid-row: span 1;
    position: relative;
    border-radius: var(--r-card);
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--sh-card);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    will-change: opacity, transform;
    animation: cardIn .18s cubic-bezier(.16,1,.3,1);
  }
  .card.new      { background: var(--card-new); }
  .card.reserved { background: var(--card-reserved); }
  .card.removing { animation: cardOut .3s ease forwards; }
  @keyframes cardIn  { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  @keyframes cardOut { from { opacity: 1; } to { opacity: 0; transform: scale(.97); } }

  /* 上段バナー = 緊急度で塗る帯。カード唯一の強い色 (卓番 + 経過) */
  .card-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px 9px;
    background: var(--u-ok);                 /* 既定=緑 (初回tick前) */
    color: var(--on-u-ok);
    cursor: grab;                            /* 長押しで並べ替え掴み */
  }
  .card.lvl-warn  .card-banner { background: var(--u-warn);  color: var(--on-u-warn); }
  .card.lvl-alert .card-banner { background: var(--u-alert); color: var(--on-u-alert); }
  .table-no {
    font-size: var(--fz-table);              /* 特大卓番 (Okage) */
    line-height: 0.86;
    font-weight: 900;
    letter-spacing: .005em;
    margin-right: auto;                      /* 左詰め・残りを経過側へ押し出す */
    font-variant-numeric: tabular-nums;
    color: inherit;
  }
  .people {
    display: flex; flex-direction: column; align-items: flex-end;
    font-size: 13px; font-weight: 800; color: inherit; line-height: 1.05;
  }
  .people .n { font-family: var(--font-num); font-size: 17px; }
  .people .unit { opacity: .85; font-size: 11px; margin-left: 1px; }
  .people .kids-inline { opacity: .85; font-size: 11px; font-weight: 800; }

  /* 経過時間 = バナー内の特大数字 (砂時計付き) */
  .elapsed {
    display: inline-flex; align-items: baseline; gap: 4px;
    padding: 0; border: none; background: none; box-shadow: none;
    color: inherit; font-weight: 900; white-space: nowrap;
  }
  .elapsed .label { font-size: 12px; letter-spacing: .06em; font-weight: 800; opacity: .9; }
  .elapsed .val   { font-family: var(--font-num); font-size: var(--fz-elapsed); line-height: 1; font-variant-numeric: tabular-nums; }

  /* 種別アンダーライン = Okageの頭直下色下線を種別軸へ (緊急度=塗り帯 と 物理分離)。#113で6pxへ増強 */
  .type-underline { height: 6px; width: 100%; background: var(--type-new); }
  .card.reserved .type-underline { background: var(--type-reserved-edge); }

  /* サブ行 = 種別 + 受付 + 操作 (囲みなし・ハーフトーンで視覚重量を最小化) */
  .card-sub {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px 6px 12px;
    background: transparent;
    border-bottom: 1px solid var(--border-soft);
  }
  .badge-type {
    font-size: 13px; font-weight: 900; letter-spacing: .04em;
    padding: 4px 10px; line-height: 1; color: #fff;
  }
  /* 種別チップ = 色に加え「形」でも判別 (#113): 新規=藍・角チップ / 予約=金・ピル形。
     いずれも白文字で AA (新規 白/藍 5.9:1 / 予約 白/金 7.2:1)。緊急の赤とは別軸に固定。 */
  .card.new      .badge-type { background: var(--type-new);      border-radius: var(--r-chip); }
  .card.reserved .badge-type { background: var(--type-reserved); border-radius: var(--r-pill); }
  .recv { font-size: 12px; color: var(--text-secondary); white-space: nowrap; margin-right: auto; }
  .recv .label { letter-spacing: .08em; font-size: 10px; font-weight: 700; }
  .recv .hhmm { font-family: var(--font-num); font-size: 14px; color: var(--text-primary); font-weight: 800; font-variant-numeric: tabular-nums; margin-left: 4px; }

  /* チビ伝プレビュー (ゴースト・ホール=読取専用では非表示) */
  .slip-btn {
    flex: 0 0 auto; min-width: 44px; min-height: 44px; /* 補助操作のタップ下限 44px (#58) */
    border: none; border-radius: 2px; background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-ui); font-size: 16px; font-weight: 800;
    cursor: pointer; transition: color .1s ease, background .1s ease;
  }
  .slip-btn:hover { color: var(--text-primary); background: rgba(0,0,0,.06); }
  body.mode-hall .slip-btn { display: none; }

  /* 削除 (バナー内・ゴースト / キッチンモード専用) */
  .delete-btn {
    flex: 0 0 auto; align-self: flex-start;
    min-width: 44px; min-height: 44px; /* 補助操作のタップ下限 44px (#58, 既定OFF=#59) */
    background: transparent; border: none; border-radius: 2px;
    color: inherit; opacity: .75;
    font-size: 15px; font-weight: 900; line-height: 1;
    cursor: pointer; padding: 0;
    transition: opacity .1s ease, background .1s ease;
  }
  .delete-btn:hover { opacity: 1; background: rgba(255,255,255,.25); }
  /* 削除の2段階確認: 1タップ目で警告状態、猶予内の再タップで削除 (#68) */
  .delete-btn.armed {
    background: #fff; color: var(--elapsed-alert); opacity: 1;
    min-width: 52px; font-size: 12px; padding: 0 6px;
  }
  body.mode-hall .delete-btn { display: none; }

  /* タイマーロック (ゴースト) */
  .lock-btn {
    flex: 0 0 auto; min-width: 44px; min-height: 44px; /* 補助操作のタップ下限 44px (#58, 既定OFF=#59) */
    background: transparent; border: none; border-radius: 2px;
    color: var(--text-secondary);
    font-size: 12px; font-weight: 800;
    cursor: pointer; padding: 0;
    transition: color .1s ease, background .1s ease;
  }
  .lock-btn:hover { color: var(--text-primary); background: rgba(0,0,0,.06); }
  .lock-btn[aria-pressed="true"] { color: #fff; background: var(--elapsed-warn); }
  .card.timer-locked .js-elapsed-val { opacity: 0.55; }
  .card.timer-locked .elapsed .val { text-decoration: line-through; text-decoration-style: dotted; }

  /* 10分超は数値を脈動 + カード全体を明滅 (色覚に依存しない動き) */
  .card.lvl-alert .elapsed { animation: pulse 1.4s ease-in-out infinite; }
  .card.lvl-alert {
    outline: 3px solid var(--elapsed-alert);
    outline-offset: -3px;
    animation: alertBlink 1s steps(1, end) infinite;
  }
  @keyframes alertBlink { 50% { outline-color: transparent; } }
  @keyframes pulse { 0%,100% { transform: none; } 50% { transform: scale(1.04); } }

  /* 品目リスト */
  .items {
    padding: 4px 0 0;
    list-style: none;
    margin: 0;
    background: transparent;
    flex: 1 1 auto;
  }
  .item {
    display: grid;
    grid-template-columns: 30px 1fr auto;
    align-items: center;
    column-gap: 10px;
    width: 100%;
    min-height: var(--row-item);
    padding: 8px 12px;
    border: none;
    border-radius: 0;
    background: transparent;
    color: var(--text-primary);
    font-family: var(--font-ui);
    text-align: left;
    cursor: pointer;
    transition: background-color .1s ease;
  }
  .item + .item { border-top: 1px solid var(--border-soft); }
  .item:hover  { background: var(--bg-raise); }
  .item:active { background: var(--bg-inset); transform: translateY(1px); }

  .check {
    width: 28px; height: 28px;
    border-radius: var(--r-chip);
    border: 2px solid #6C747C;   /* 空チェックの枠: 白地で非テキスト3:1+ (実測4.7:1) */
    display: grid; place-items: center;
    color: transparent;
    font-size: 18px; font-weight: 900; line-height: 1;
    transition: background-color .1s ease, border-color .1s ease;
  }
  .item-main { min-width: 0; }
  /* 長い品名対策 (略称マスタ未確定のため name はそのまま使い、表示の省略のみで崩れ防止)。
     最大2行で省略 (…)。対応しないブラウザは折返しで崩れない fallback。 */
  .item-name {
    font-size: 23px; font-weight: 700; line-height: 1.2;   /* 22-26px 要件 */
    overflow: hidden;
    overflow-wrap: anywhere;       /* 長い連続文字でもカード幅を割らない */
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    line-clamp: 2;
  }
  .item-opt  {
    font-size: 14px; color: var(--text-secondary); margin-top: 2px; line-height: 1.3;
    overflow: hidden;
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    line-clamp: 2;
  }
  /* 署名: 黒塗り四角 + 白数字 (Okage) */
  .item-qty  {
    min-width: 34px; height: 34px; padding: 0 7px;
    display: inline-grid; place-items: center;
    background: var(--qty-box); color: var(--qty-num);
    border-radius: var(--r-box);
    font-family: var(--font-num);
    font-size: var(--fz-qty); font-weight: 900;
    font-variant-numeric: tabular-nums; line-height: 1;
    white-space: nowrap;
  }
  .item-qty .x { display: none; }   /* × を消し数字のみを box 内に */

  /* 完了状態: 打ち消し線 + 減光 (色だけに頼らず線で示す) */
  .item.done .item-name { text-decoration: line-through; text-decoration-thickness: 2px; color: var(--text-secondary); }
  .item.done .item-opt  { text-decoration: line-through; opacity: .7; }
  .item.done .item-qty  { opacity: .4; }
  .item.done .check {
    background: var(--u-ok);
    border-color: var(--u-ok);
    color: #fff;
  }
  .item.done .check::after { content: "\2713"; }   /* チェックマーク */

  /* ============================================================ コンロ番号 1〜10 (デシャップ後打ち)
     状態サイクル: スケルトン(未使用/透明) → 白(使用中) → 赤(タイマー管理中) → スケルトン
     ・カードidに紐付け (注文 KDS_ORDERS とは別管理)。LS + BroadcastChannel で2台同期。
     ・経過警告の赤(大きいバッジ)と区別するため、コンロは小さめ・番号ラベル付き。
     ・同番号のコンロは物理的に1台 = 同時に1卓のみ。ある卓が使用中/タイマー管理中(白/赤)の間、
       他カードの同番号ボタンはロック(押下不可・占有卓を表示)。使用中を解除(→未使用)で解錠され
       別卓へ割当可能になる (#114 = コンロ移動は明示的な解除→再割当で実現)。 */
  /* 既定は使用中(white/red)のみの細帯 (40px)、「割当」で全1-10を展開 = 電卓の壁を解消。
     10ボタンは常にDOM保持し skeleton をCSSで隠すだけ → 同期(setAttribute data-state)契約は不変。 */
  .konro {
    padding: 0 var(--pad-card) 6px;
    background: transparent;
    border-top: 1px solid var(--border-soft);
  }
  .konro-head {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
  }
  .konro-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-secondary);
    font-weight: 800;
  }
  .konro-toggle {
    margin-left: auto;
    min-height: 44px; min-width: 44px;
    padding: 0 12px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-chip);
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-ui);
    font-size: 13px; font-weight: 800;
    cursor: pointer;
    transition: color .1s ease, border-color .1s ease, background .1s ease;
  }
  .konro-toggle:hover { color: var(--text-primary); border-color: var(--text-primary); }
  .konro.expanded .konro-toggle { border-style: solid; border-color: var(--border-strong); }
  body.mode-hall .konro-toggle { display: none; }

  /* 既定(畳): 使用中のみ横並び。skeleton は隠す */
  .konro-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .konro:not(.expanded) .konro-btn[data-state="skeleton"] { display: none; }
  /* 展開: 全1-10を5列グリッドで (タップ域確保) */
  .konro.expanded .konro-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    padding-top: 2px;
  }
  .konro-btn {
    position: relative;
    min-width: 44px;
    min-height: 44px; /* 補助操作のタップ下限 44px (#58) */
    padding: 4px 6px;
    border-radius: var(--r-chip);
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-secondary);
    font-family: var(--font-num);
    font-size: 16px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    cursor: pointer;
    transition: background-color .1s ease, border-color .1s ease, transform .1s ease;
  }
  .konro.expanded .konro-btn { min-height: 46px; font-size: 18px; }
  .konro-btn:hover  { border-color: var(--border-strong); color: var(--text-primary); }
  .konro-btn:active { transform: translateY(1px); }
  /* state=white: コンロ使用中 (濃炭塗り・白数字) */
  .konro-btn[data-state="white"] {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: #fff;
  }
  /* state=red: タイマー管理中 (朱赤塗り・白数字) */
  .konro-btn[data-state="red"] {
    background: var(--u-alert);
    border-color: var(--u-alert);
    color: #ffffff;
  }
  /* 状態を色だけに頼らない (WCAG 1.4.1) */
  .konro-btn[data-state="white"]::after,
  .konro-btn[data-state="red"]::after {
    content: "";
    position: absolute;
    top: 4px; right: 4px;
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .konro-btn[data-state="white"]::after { background: var(--bg-raise); }
  .konro-btn[data-state="red"]::after   { background: #ffffff; }

  /* data-locked: 他カードが同番号を占有中 (物理コンロは同時1卓) → 押下不可 + 占有卓バッジ (#114) */
  .konro-btn[data-locked="true"] {
    background: repeating-linear-gradient(-45deg, var(--bg-inset) 0 5px, var(--bg-raise) 5px 10px);
    border-color: var(--border);
    border-style: dashed;
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .konro-btn[data-locked="true"]:hover  { border-color: var(--border); color: var(--text-muted); }
  .konro-btn[data-locked="true"]:active { transform: none; }
  /* 占有卓バッジ (data-owner に卓番)。ロック時は data-state=skeleton なので state ドットとは競合しない */
  .konro-btn[data-locked="true"]::after {
    content: attr(data-owner);
    position: absolute;
    top: -6px; right: -5px;
    min-width: 13px; height: 15px;
    padding: 0 3px;
    border-radius: 8px;
    background: var(--u-alert);
    color: #fff;
    font-family: var(--font-num);
    font-size: 9px; font-weight: 900;
    line-height: 15px;
    text-align: center;
    letter-spacing: .02em;
  }

  /* ============================================================ カード並べ替え (長押し起動 / 誤操作防止) */
  /* 長押し中フィードバック */
  .card.grabbed {
    box-shadow: 6px 6px 0 var(--border);
    transform: scale(1.03);
    z-index: 5;
    cursor: grabbing;
    animation: grabWiggle .4s ease-in-out;
  }
  @keyframes grabWiggle { 0%,100%{ transform: scale(1.03) rotate(0); } 25%{ transform: scale(1.03) rotate(-0.8deg);} 75%{ transform: scale(1.03) rotate(0.8deg);} }
  .card.drop-target { outline: 3px solid var(--elapsed-ok); outline-offset: 2px; }
  .card.reordering { transition: transform .2s cubic-bezier(.16,1,.3,1); }
  /* 長押し進捗バー */
  .card .grab-progress {
    position: absolute;
    top: 0; left: 0; height: 4px; width: 0%;
    background: var(--accent-new);
    pointer-events: none;
    z-index: 6;
    opacity: 0;
  }
  .card.grabbing-pending .grab-progress { opacity: 1; }
  .card { position: relative; }

  /* 並べ替えモード中の取消バー */
  .reorder-bar {
    position: fixed;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    z-index: 50;
    display: none;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: var(--bg-raise);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    box-shadow: var(--sh-pop);
  }
  body.is-reordering .reorder-bar,
  .reorder-bar.show { display: flex; }   /* .show = 確定直後の「戻す」猶予表示 (#62) */
  .reorder-bar .msg { font-size: 15px; font-weight: 800; color: var(--text-primary); }
  .reorder-bar button {
    min-height: 48px; padding: 8px 18px;
    border-radius: var(--r-chip); border: 1px solid var(--border-strong);
    background: var(--card); color: var(--text-primary);
    font-size: 15px; font-weight: 800; cursor: pointer;
    transition: background-color .1s ease, transform .1s ease;
  }
  .reorder-bar button:hover { background: var(--bg-raise); }
  .reorder-bar button:active { transform: translateY(1px); }
  .reorder-bar button.confirm { border-color: var(--u-ok); color: var(--u-ok); }

  /* ============================================================ 全完了の取り消しトースト
     全品目タップ完了で消えたカードを、誤タップに備え数秒だけ戻せるようにする */
  .toast {
    position: fixed;
    left: 18px; bottom: 18px;
    z-index: 60;
    display: none;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--text-primary);
    color: var(--bg-base);
    border: 1px solid var(--chrome-line);
    border-radius: var(--r-card);
    box-shadow: var(--sh-pop);
    font-size: 16px;
    font-weight: 800;
  }
  .toast.show { display: flex; animation: cardIn .22s cubic-bezier(.16,1,.3,1); }
  .toast .undo-btn {
    min-height: 48px;
    padding: 8px 18px;
    border: 2px solid var(--bg-base);
    border-radius: var(--r-chip);
    background: transparent;
    color: var(--bg-base);
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: background-color .1s ease, color .1s ease;
  }
  .toast .undo-btn:hover { background: var(--bg-base); color: var(--text-primary); }
  .toast .undo-btn:active { transform: translateY(1px); }

  /* ============================================================ 右ペイン: 予約ストックパネル */
  .stock {
    flex: 0 0 340px;
    width: 340px;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-raise);
    border-left: 1px solid var(--border);
  }
  .stock-head {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 52px;
    padding: 0 14px;
    background: var(--chrome);
    color: var(--on-chrome);
  }
  .stock-head .title {
    font-size: 16px; font-weight: 900; letter-spacing: .02em;
    color: var(--on-chrome);
  }
  .stock-head .count {
    font-family: var(--font-num); font-size: 14px; font-weight: 900;
    color: var(--chrome);
    font-variant-numeric: tabular-nums;
    background: var(--type-reserved-edge);
    border: 0;
    padding: 1px 8px;
    border-radius: var(--r-chip);
  }
  .stock-add {
    margin-left: auto;
    min-width: 44px; min-height: 44px;
    padding: 0;
    border-radius: var(--r-chip);
    border: 0;
    background: var(--cta);
    color: #fff;
    font-size: 24px; font-weight: 900; line-height: 1;
    cursor: pointer;
    transition: background-color .12s ease, transform .1s ease;
  }
  .stock-add:hover  { background: var(--cta-hover); }
  .stock-add:active { transform: translateY(1px); }

  .stock-list {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .stock-empty {
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    padding: 24px 12px;
    line-height: 1.6;
  }

  .res-card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-radius: var(--r-card);
    background: var(--card-reserved);
    border: 1px solid var(--border);
    border-left: 5px solid var(--type-reserved-edge);
    padding: 12px 14px;
    box-shadow: var(--sh-card);
    animation: cardIn .22s cubic-bezier(.16,1,.3,1);
  }
  .res-card.soon { border-left-color: var(--u-warn); }
  .res-card.late { border-left-color: var(--u-alert); }
  .res-top {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
  }
  .res-time {
    font-family: var(--font-num);
    font-size: 30px; font-weight: 900;
    letter-spacing: .01em;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .res-people { font-size: 14px; color: var(--text-primary); font-weight: 800; text-align: right; }
  .res-people .n { font-family: var(--font-num); font-size: 18px; }
  .res-people .kids { color: var(--text-secondary); font-size: 12px; display:block; }  /* 白カード地なので AA(4.5:1) を満たす濃色トークンを使う */
  .res-name { font-size: 16px; font-weight: 700; color: var(--text-primary); overflow-wrap: anywhere; }
  .res-menu {
    margin: 6px 0 0;
    padding: 8px 0 0; list-style: none;
    font-size: 14px; color: var(--text-secondary); line-height: 1.5;
    border-top: 1px solid var(--border-soft);
  }
  .res-menu li { display: flex; align-items: baseline; gap: 4px; overflow-wrap: anywhere; padding: 2px 0; }
  .res-menu li::before { content: "\25A0"; font-size: 8px; color: var(--type-reserved-edge); flex: 0 0 auto; }
  .res-menu li .q { font-family: var(--font-num); color: var(--text-primary); font-weight: 800; margin-left: auto; }
  /* 30分前通知バッジ (フロー先頭・被り皆無)。琥珀地は濃文字でAA */
  .res-soon-badge {
    align-self: flex-start;
    order: -1;                          /* カード先頭に置き被りを回避 */
    padding: 3px 10px;
    border-radius: var(--r-chip);
    background: var(--u-warn);
    color: var(--on-u-warn);
    font-size: 12px; font-weight: 900; letter-spacing: .02em;
    display: none;
    animation: soonPulse 1.3s ease-in-out infinite;
  }
  .res-card.soon .res-soon-badge { display: inline-block; }
  /* 予約時刻を過ぎたら「超過 +N分」の赤バッジに切り替え (黙って消さない) */
  .res-card.late .res-soon-badge {
    display: inline-block;
    background: var(--u-alert);
    color: #fff;
  }
  @keyframes soonPulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.08); } }

  .res-actions { display: flex; gap: 8px; margin-top: 10px; align-items: stretch; }
  /* 卓番はフリーテキストではなくダイヤルモーダルで選択するボタン (誤入力防止 #118) */
  .res-seat {
    flex: 1 1 auto; min-width: 0;
    min-height: 48px;
    padding: 8px 12px;
    border-radius: var(--r-chip);
    border: 2px solid var(--type-new);
    background: #fff;
    color: var(--text-primary);
    font-family: var(--font-num);
    font-size: 18px; font-weight: 800;
    text-align: center;
    cursor: pointer;
    transition: border-color .12s ease;
  }
  .res-seat:hover { border-color: var(--type-new); background: var(--type-new-soft); }
  .res-seat.placeholder { color: var(--text-secondary); font-weight: 600; font-family: var(--font-ui); }
  .res-go {
    flex: 0 0 auto;
    min-height: 48px;
    padding: 8px 16px;
    border-radius: var(--r-chip);
    border: 0;
    background: var(--cta);
    color: #ffffff;
    font-size: 16px; font-weight: 900;
    cursor: pointer;
    transition: background-color .12s ease, transform .1s ease;
  }
  .res-go:hover  { background: var(--cta-hover); }
  .res-go:active { transform: translateY(1px); }
  .res-del {
    flex: 0 0 auto;

    /* ===================== ユーティリティ ===================== */
    function t(key) { return LABELS[key] || key; }

    function pad2(n) { return n < 10 ? "0" + n : "" + n; }

    function hhmm(ts) {
      var d = new Date(ts);
      return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
    }

    function safeParse(json, fallback) {
      try { var v = JSON.parse(json); return v == null ? fallback : v; }
      catch (e) { return fallback; }
    }

    function elapsedMin(startTs) {
      var ms = Date.now() - Number(startTs);
      if (!isFinite(ms) || ms < 0) ms = 0;
      return Math.floor(ms / 60000);
    }

    function levelOf(min) {
      if (min >= ALERT_MIN) return "alert";
      if (min >= WARN_MIN)  return "warn";
      return "ok";
    }

    /* ===================== #13 レーン表示（カテゴリ別） =====================
       注文＝カードのグリッドとは別に、未完了品目をカテゴリ別3レーン（ご飯類/サイド/ドリンク）へ
       横断表示する。コンロ側・中間スタッフ側での作業分担が目的。完了状態・同期はグリッドと共通
       （onToggle / doneMap を流用）。品名→カテゴリはPOSデータに無いため KDS 内で自動分類する。 */
    var LANE_CATS = ["rice", "side", "drink"];
    var lastLaneSig = "";

    /* 品名からカテゴリを推定する（実メニュー基準・未知はサイドへ寄せる） */
    function itemCategory(name) {
      var s = String(name == null ? "" : name);
      if (/ビール|オリオン|焼酎|豊の国|黒霧島|ハイボール|サワー|ウーロンハイ|泡盛|薫長|純米|吟醸|辛口|ウーロン茶|オレンジ|コーラ|サイダー|ジュース|水割り|ソーダ|ロック|茶|酒/.test(s)) return "drink";
      if (/御膳|ご飯|ごはん|丼|白米|出汁米|卵かけ|ライス|そば|うどん|麺|米/.test(s)) return "rice";
      return "side";
    }

    /* レーン表示を描画する（未完了品目のみ・orderSeq 順）。
       構造シグネチャが不変なら再描画しない（スクロール位置を保つ）。 */
    function renderLanes(force) {
      var buckets = { rice: [], side: [], drink: [] };
      var ids = orderSeq.filter(function (id) { return cards[id]; });
      Object.keys(cards).forEach(function (id) { if (ids.indexOf(id) === -1) ids.push(id); });
      var sig = [];
      ids.forEach(function (id) {
        var entry = cards[id];
        if (!entry || !entry.order) return;
        var order = entry.order;
        var done = doneMap[order.id] || [];
        var lvl = lockedTimers[id] ? "ok" : levelOf(elapsedMin(order.start));
        (order.items || []).forEach(function (it, idx) {
          if (done[idx]) return;   // 完了品目はレーンに出さない
          buckets[itemCategory(it.name)].push({ order: order, item: it, idx: idx, lvl: lvl });
          sig.push(id + ":" + idx + ":" + lvl);
        });
      });
      var sigStr = sig.join("|");
      if (!force && sigStr === lastLaneSig) return;
      lastLaneSig = sigStr;

      LANE_CATS.forEach(function (cat) {
        var body = laneBodies[cat];
        if (!body) return;
        body.innerHTML = "";
        var rows = buckets[cat];
        if (laneCounts[cat]) laneCounts[cat].textContent = String(rows.length);
        if (!rows.length) {
          var em = document.createElement("div");
          em.className = "lane-empty";
          em.textContent = "なし";
          body.appendChild(em);
          return;
        }
        rows.forEach(function (r) { body.appendChild(buildLaneItem(r)); });
      });
    }

    /* 注文端末からの options / allergies を1本の注記テキストに正規化する。
       アレルギーはキー表記ゆれ (allergies / allergy / allergyInfo)・配列を許容する。 */
    function normalizeNoteValue(value) {
      if (value == null || value === false) return "";
      if (Array.isArray(value)) {
        return value.filter(function (v) { return v != null && String(v).trim() !== ""; })
          .map(function (v) { return String(v).trim(); }).join("、");
      }
      return String(value).trim();
    }

    function itemNotesText(item) {
      var notes = [];
      var optionText = normalizeNoteValue(item.options);
      var allergyText = normalizeNoteValue(item.allergies || item.allergy || item.allergyInfo);
      if (optionText) notes.push(optionText);
      if (allergyText) notes.push("アレルギー: " + allergyText);
      return notes.join(" / ");
    }

    function buildLaneItem(r) {
      var order = r.order, it = r.item;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "lane-item" + (order.type === "reserved" ? " reserved" : "") +
        (r.lvl === "warn" ? " lvl-warn" : (r.lvl === "alert" ? " lvl-alert" : ""));

      var tbl = document.createElement("span");
      tbl.className = "lane-table";
      tbl.textContent = order.table != null ? String(order.table) : "-";

      var mid = document.createElement("span");
      var nm = document.createElement("span");
      nm.className = "lane-name";
      nm.textContent = it.name != null ? String(it.name) : "";
      mid.appendChild(nm);
      var laneNotes = itemNotesText(it);
      if (laneNotes) {
        var op = document.createElement("span");
        op.className = "lane-opt";
        op.textContent = laneNotes;
        mid.appendChild(op);
      }

      var qty = document.createElement("span");
      qty.className = "lane-qty";
      qty.textContent = "×" + Number(it.qty || 1);

      btn.appendChild(tbl);
      btn.appendChild(mid);
      btn.appendChild(qty);
      btn.addEventListener("click", function () { onToggle(order.id, r.idx); });
      return btn;
    }

      applyView();

    /* ===================== 当日分のみ運用 (#63) =====================
       「データ保存は当日分のみ・永続DB無し」(deshup-spec / 議事録6/18)。
       日付が変わって起動したら前日の運用データを破棄する。
       設定 (権限モード/トグル類) と提供時間ログ (#29 KPIベースライン用に意図的に永続) は対象外。 */
    function todayStr() {
      var d = new Date();
      return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
    }
    function purgeStaleDay() {
      var today = todayStr();
      try {
        var last = localStorage.getItem(LS_DAY);
        if (last && last !== today) {
          [LS_STOCK, LS_DONE, LS_ORDER, LS_KONRO, LS_LOCKED, LS_DELETED].forEach(function (key) {
            localStorage.removeItem(key);
          });
        }
        localStorage.setItem(LS_DAY, today);
      } catch (e) {}
    }

    /* ===================== LocalStorage (完了状態) ===================== */
    function loadDone() { doneMap = safeParse(localStorage.getItem(LS_DONE), {}) || {}; }

    function saveDone() {

    /* ----- コンロ番号状態 (カードidに紐付け / 注文配列とは別管理) ----- */
    function loadKonro() {
      var v = safeParse(localStorage.getItem(LS_KONRO), {}) || {};
      konroMap = (v && typeof v === "object") ? v : {};
    }

    function saveKonro() {

    /* ----- 配膳カードの並び順 (LS正本 / BC同期) ----- */
    function loadOrderSeq() {
      var v = safeParse(localStorage.getItem(LS_ORDER), []);
      orderSeq = Array.isArray(v) ? v.map(String) : [];
